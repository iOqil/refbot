version: "3.8"

services:
  bot:
    build: .
    container_name: refbot
    restart: always
    env_file:
      - .env
    volumes:
      - bot_backups:/app/backups

  db:
    image: mysql:8.0
    container_name: refbot_mysql
    profiles: ["local-db"]
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  bot_backups:
